name: ci.yml
on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and run tests
        run: mvn -B -ntp clean verify

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Checkstyle and SpotBugs
        run: mvn -B -ntp verify -Pcheck

  docker-smoke-test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build jars
        run: mvn -B -ntp clean package -DskipTests

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for stats service
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:9090/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Wait for main service
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down -v