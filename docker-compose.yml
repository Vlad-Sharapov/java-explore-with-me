services:
  ewm-service:
    ports:
      - "8080:8080"
    build: main-service/
    container_name: main-service
    depends_on:
      stats-server:
        condition: service_healthy
      ewm-service-db:
        condition: service_healthy
    environment:
      - STATE_SERVER_URL=http://stats-server:9090
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ewm-service-db:5432/ewm-service-db
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
  ewm-service-db:
    image: postgres:16-alpine
    container_name: ewm-service-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=ewm-service-db
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d ewm-service-db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  stats-server:
    ports:
      - "9090:9090"
    build: stat-service/stat-server/
    container_name: stat-service
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats-db
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/actuator/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  stats-db:
    image: postgres:16-alpine
    container_name: stats-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=stats-db
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d stats-db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
